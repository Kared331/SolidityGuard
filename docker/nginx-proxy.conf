# 5.22: Optional HTTPS reverse proxy
# To use: docker compose --profile https up
# Place your TLS certs in ./certs/ and uncomment the ssl lines below.

upstream api_backend {
    server api:8000;
}

upstream frontend_backend {
    server frontend:8080;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Uncomment for Let's Encrypt ACME challenge:
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # TLS configuration – provide your own certs
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # For self-signed testing (remove in production):
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout certs/privkey.pem -out certs/fullchain.pem

    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    location /api {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location / {
        proxy_pass http://frontend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
