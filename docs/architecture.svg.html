<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SolidiGuard Architecture</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1e3a5f;
      --process: #312e81;
      --storage: #134e4a;
      --external: #713f12;
      --risk: #7f1d1d;
    }
  }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  svg { display: block; margin: 0 auto; max-width: 100%; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: var(--fg); }
  .muted { fill: var(--muted); }
  .label { font-size: 13px; font-weight: 600; }
  .sublabel { font-size: 11px; }
  .box { rx: 8; ry: 8; stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--line); stroke-width: 1.5; marker-end: url(#arrow); }
  .arrow-dashed { fill: none; stroke: var(--line); stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrow); }
  .group-box { rx: 12; ry: 12; stroke-width: 1; stroke-dasharray: 6 4; }
  .badge { rx: 10; ry: 10; }
  .badge-text { font-size: 10px; font-weight: 600; }
</style>
<svg viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700">SolidiGuard — System Architecture</text>

  <!-- Frontend Group -->
  <rect x="30" y="60" width="160" height="160" class="group-box" fill="var(--input)" fill-opacity="0.3" stroke="var(--input)"/>
  <text x="110" y="80" text-anchor="middle" class="label">Frontend</text>
  <rect x="50" y="95" width="120" height="36" class="box" fill="var(--input)" stroke="var(--input)"/>
  <text x="110" y="118" text-anchor="middle" class="sublabel">React 18 + Vite</text>
  <rect x="50" y="140" width="120" height="36" class="box" fill="var(--input)" stroke="var(--input)"/>
  <text x="110" y="163" text-anchor="middle" class="sublabel">Ant Design</text>
  <rect x="50" y="185" width="120" height="24" class="badge" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="110" y="202" text-anchor="middle" class="badge-text muted">:3000 (nginx)</text>

  <!-- API Gateway -->
  <rect x="240" y="80" width="150" height="60" class="box" fill="var(--process)" stroke="var(--process)"/>
  <text x="315" y="108" text-anchor="middle" class="label">API Gateway</text>
  <text x="315" y="125" text-anchor="middle" class="sublabel">FastAPI + Uvicorn</text>
  <rect x="265" y="145" width="100" height="20" class="badge" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="315" y="160" text-anchor="middle" class="badge-text muted">:8000</text>

  <!-- Celery Workers Group -->
  <rect x="440" y="60" width="200" height="180" class="group-box" fill="var(--process)" fill-opacity="0.3" stroke="var(--process)"/>
  <text x="540" y="80" text-anchor="middle" class="label">Celery Workers</text>
  <rect x="460" y="95" width="160" height="28" class="box" fill="var(--process)" stroke="var(--process)"/>
  <text x="540" y="114" text-anchor="middle" class="sublabel">File Processing</text>
  <rect x="460" y="130" width="160" height="28" class="box" fill="var(--process)" stroke="var(--process)"/>
  <text x="540" y="149" text-anchor="middle" class="sublabel">Slither Analysis</text>
  <rect x="460" y="165" width="160" height="28" class="box" fill="var(--process)" stroke="var(--process)"/>
  <text x="540" y="184" text-anchor="middle" class="sublabel">Foundry Fuzzing</text>
  <rect x="460" y="200" width="160" height="28" class="box" fill="var(--process)" stroke="var(--process)"/>
  <text x="540" y="219" text-anchor="middle" class="sublabel">LLM Audit (RAG)</text>

  <!-- Data Layer Group -->
  <rect x="30" y="290" width="380" height="130" class="group-box" fill="var(--storage)" fill-opacity="0.3" stroke="var(--storage)"/>
  <text x="220" y="310" text-anchor="middle" class="label">Data Layer</text>
  <rect x="50" y="325" width="140" height="44" class="box" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="120" y="345" text-anchor="middle" class="sublabel">PostgreSQL 15</text>
  <text x="120" y="360" text-anchor="middle" class="sublabel muted">Tasks · Reports · Results</text>
  <rect x="210" y="325" width="100" height="44" class="box" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="260" y="345" text-anchor="middle" class="sublabel">Redis</text>
  <text x="260" y="360" text-anchor="middle" class="sublabel muted">Broker</text>
  <rect x="50" y="380" width="140" height="30" class="box" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="120" y="400" text-anchor="middle" class="sublabel">Chroma Vector DB</text>
  <rect x="210" y="380" width="190" height="30" class="box" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="305" y="400" text-anchor="middle" class="sublabel">File System (uploads/reports)</text>

  <!-- External Services Group -->
  <rect x="690" y="60" width="180" height="180" class="group-box" fill="var(--external)" fill-opacity="0.3" stroke="var(--external)"/>
  <text x="780" y="80" text-anchor="middle" class="label">External</text>
  <rect x="710" y="95" width="140" height="44" class="box" fill="var(--external)" stroke="var(--external)"/>
  <text x="780" y="115" text-anchor="middle" class="sublabel">LLM API</text>
  <text x="780" y="130" text-anchor="middle" class="sublabel muted">OpenAI / Anthropic</text>
  <rect x="710" y="150" width="140" height="44" class="box" fill="var(--external)" stroke="var(--external)"/>
  <text x="780" y="170" text-anchor="middle" class="sublabel">SWC Registry</text>
  <text x="780" y="185" text-anchor="middle" class="sublabel muted">GitHub</text>
  <rect x="710" y="200" width="140" height="28" class="box" fill="var(--external)" stroke="var(--external)"/>
  <text x="780" y="219" text-anchor="middle" class="sublabel">Embedding API</text>

  <!-- Docker Compose Group -->
  <rect x="490" y="290" width="380" height="130" class="group-box" fill="var(--risk)" fill-opacity="0.2" stroke="var(--risk)"/>
  <text x="680" y="310" text-anchor="middle" class="label">Docker Compose</text>
  <rect x="510" y="325" width="100" height="28" class="box" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="560" y="344" text-anchor="middle" class="sublabel">api</text>
  <rect x="620" y="325" width="100" height="28" class="box" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="670" y="344" text-anchor="middle" class="sublabel">worker</text>
  <rect x="730" y="325" width="120" height="28" class="box" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="790" y="344" text-anchor="middle" class="sublabel">postgres :5432</text>
  <rect x="510" y="365" width="100" height="28" class="box" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="560" y="384" text-anchor="middle" class="sublabel">redis :6379</text>
  <rect x="620" y="365" width="100" height="28" class="box" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="670" y="384" text-anchor="middle" class="sublabel">frontend :3000</text>
  <rect x="730" y="365" width="120" height="28" class="box" fill="var(--neutral)" stroke="var(--line)"/>
  <text x="790" y="384" text-anchor="middle" class="sublabel">chroma_data</text>

  <!-- Arrows: Frontend → API -->
  <path d="M 190 120 L 237 120" class="arrow"/>
  <!-- Arrows: API → Workers -->
  <path d="M 390 110 L 457 110" class="arrow"/>
  <!-- Arrows: API → PostgreSQL -->
  <path d="M 315 170 L 315 290" class="arrow"/>
  <!-- Arrows: API → Redis -->
  <path d="M 340 170 L 260 325" class="arrow"/>
  <!-- Arrows: Workers → Redis -->
  <path d="M 540 240 L 260 325" class="arrow"/>
  <!-- Arrows: Workers → PostgreSQL -->
  <path d="M 460 240 L 120 325" class="arrow"/>
  <!-- Arrows: Workers → Chroma -->
  <path d="M 480 240 L 120 380" class="arrow-dashed"/>
  <!-- Arrows: Workers → LLM API -->
  <path d="M 660 120 L 707 120" class="arrow"/>
  <!-- Arrows: Workers → SWC Registry -->
  <path d="M 660 140 L 707 170" class="arrow-dashed"/>

  <!-- Legend -->
  <rect x="30" y="460" width="840" height="45" rx="8" ry="8" fill="var(--neutral)" fill-opacity="0.5" stroke="none"/>
  <line x1="60" y1="482" x2="100" y2="482" stroke="var(--line)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="110" y="487" class="sublabel">Sync flow</text>
  <line x1="200" y1="482" x2="240" y2="482" stroke="var(--line)" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="250" y="487" class="sublabel">Async / External</text>
  <rect x="370" y="472" width="16" height="16" rx="3" fill="var(--input)" stroke="var(--input)"/>
  <text x="392" y="487" class="sublabel">Frontend</text>
  <rect x="460" y="472" width="16" height="16" rx="3" fill="var(--process)" stroke="var(--process)"/>
  <text x="482" y="487" class="sublabel">Processing</text>
  <rect x="550" y="472" width="16" height="16" rx="3" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="572" y="487" class="sublabel">Storage</text>
  <rect x="630" y="472" width="16" height="16" rx="3" fill="var(--external)" stroke="var(--external)"/>
  <text x="652" y="487" class="sublabel">External</text>
</svg>
