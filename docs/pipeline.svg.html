<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SolidiGuard Audit Pipeline</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --success: #bbf7d0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1e3a5f;
      --process: #312e81;
      --storage: #134e4a;
      --external: #713f12;
      --risk: #7f1d1d;
      --success: #14532d;
    }
  }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  svg { display: block; margin: 0 auto; max-width: 100%; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: var(--fg); }
  .muted { fill: var(--muted); }
  .label { font-size: 13px; font-weight: 600; }
  .sublabel { font-size: 11px; }
  .step-num { font-size: 14px; font-weight: 700; }
  .box { rx: 8; ry: 8; stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--line); stroke-width: 2; marker-end: url(#arrow2); }
</style>
<svg viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line)"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700">Audit Pipeline Flow</text>

  <!-- Step 1: Upload -->
  <rect x="20" y="55" width="130" height="60" class="box" fill="var(--input)" stroke="var(--input)"/>
  <circle cx="40" cy="68" r="10" fill="var(--fg)" stroke="none"/>
  <text x="40" y="73" text-anchor="middle" class="step-num" fill="var(--bg)">1</text>
  <text x="95" y="82" text-anchor="middle" class="label">Upload</text>
  <text x="95" y="100" text-anchor="middle" class="sublabel muted">.sol / .zip / .tar.gz</text>

  <!-- Arrow -->
  <path d="M 150 85 L 180 85" class="arrow"/>

  <!-- Step 2: Slither -->
  <rect x="185" y="55" width="130" height="60" class="box" fill="var(--process)" stroke="var(--process)"/>
  <circle cx="205" cy="68" r="10" fill="var(--fg)" stroke="none"/>
  <text x="205" y="73" text-anchor="middle" class="step-num" fill="var(--bg)">2</text>
  <text x="260" y="82" text-anchor="middle" class="label">Slither</text>
  <text x="260" y="100" text-anchor="middle" class="sublabel muted">Static Analysis</text>

  <!-- Arrow -->
  <path d="M 315 85 L 345 85" class="arrow"/>

  <!-- Step 3: Fuzzing -->
  <rect x="350" y="55" width="130" height="60" class="box" fill="var(--process)" stroke="var(--process)"/>
  <circle cx="370" cy="68" r="10" fill="var(--fg)" stroke="none"/>
  <text x="370" y="73" text-anchor="middle" class="step-num" fill="var(--bg)">3</text>
  <text x="425" y="82" text-anchor="middle" class="label">Foundry</text>
  <text x="425" y="100" text-anchor="middle" class="sublabel muted">Fuzz Testing</text>

  <!-- Arrow -->
  <path d="M 480 85 L 510 85" class="arrow"/>

  <!-- Step 4: LLM Audit -->
  <rect x="515" y="55" width="130" height="60" class="box" fill="var(--process)" stroke="var(--process)"/>
  <circle cx="535" cy="68" r="10" fill="var(--fg)" stroke="none"/>
  <text x="535" y="73" text-anchor="middle" class="step-num" fill="var(--bg)">4</text>
  <text x="590" y="82" text-anchor="middle" class="label">LLM Audit</text>
  <text x="590" y="100" text-anchor="middle" class="sublabel muted">RAG Enhanced</text>

  <!-- Arrow -->
  <path d="M 645 85 L 675 85" class="arrow"/>

  <!-- Step 5: Report -->
  <rect x="680" y="55" width="130" height="60" class="box" fill="var(--success)" stroke="var(--success)"/>
  <circle cx="700" cy="68" r="10" fill="var(--fg)" stroke="none"/>
  <text x="700" y="73" text-anchor="middle" class="step-num" fill="var(--bg)">5</text>
  <text x="755" y="82" text-anchor="middle" class="label">Report</text>
  <text x="755" y="100" text-anchor="middle" class="sublabel muted">HTML · PDF · Word</text>

  <!-- RAG detail -->
  <rect x="310" y="145" width="500" height="95" rx="10" ry="10" fill="var(--external)" fill-opacity="0.3" stroke="var(--external)" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="560" y="168" text-anchor="middle" class="label">RAG Enhancement Pipeline</text>
  <rect x="330" y="180" width="140" height="36" class="box" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="400" y="203" text-anchor="middle" class="sublabel">SWC Registry</text>
  <path d="M 470 198 L 510 198" class="arrow"/>
  <rect x="515" y="180" width="140" height="36" class="box" fill="var(--storage)" stroke="var(--storage)"/>
  <text x="585" y="203" text-anchor="middle" class="sublabel">Chroma Vector DB</text>
  <path d="M 655 198 L 695 198" class="arrow"/>
  <rect x="700" y="180" width="90" height="36" class="box" fill="var(--process)" stroke="var(--process)"/>
  <text x="745" y="203" text-anchor="middle" class="sublabel">Top-K Match</text>
  <path d="M 560 180 L 560 145" class="arrow" style="marker-end:none;"/>
  <text x="565" y="140" text-anchor="middle" class="sublabel muted">Injects context into Step 4</text>
</svg>
